name: Release Build Workflow

on:
  push:
    tags:
      - 'v*.*.*'
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

jobs:
  build_android:
    name: Build Android Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: echo "TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" > .env

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk movie_verse_release.apk
          mv build/app/outputs/flutter-apk/app-debug.apk movie_verse_debug.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-apks
          path: |
            movie_verse_release.apk
            movie_verse_debug.apk

  create_release:
    name: Create GitHub Release
    needs: [build_android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: app-apks

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            movie_verse_release.apk
            movie_verse_debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
